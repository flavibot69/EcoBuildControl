<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBuild - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f8f9fa;">
    <nav class="navbar shadow-sm mb-4" style="background-color: var(--eco-dark);">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="admin-home.html">
                <span style="color: var(--eco-accent);">←</span> EcoBuild Admin
            </a>
            <button id="logout-btn" class="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" style="color: var(--eco-dark);">📦 Stock de Materiales</h2>
                <p class="text-muted small">Control de insumos en bodega</p>
            </div>
            <button class="btn btn-eco shadow-sm" data-bs-toggle="modal" data-bs-target="#modalAdd">➕ Surtir</button>
        </div>

        <div class="table-responsive shadow-sm rounded-4 overflow-hidden border-0">
            <table class="table table-hover align-middle mb-0 bg-white">
                <thead style="background-color: var(--eco-dark); color: white;">
                    <tr>
                        <th class="p-3">Insumo</th>
                        <th class="p-3 text-center">Cantidad</th>
                        <th class="p-3 text-center">Estado</th>
                        <th class="p-3 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="inventory-body">
                    </tbody>
            </table>
        </div>
        
        <div class="text-center mt-4 d-md-none">
            <a href="admin-home.html" class="text-decoration-none text-muted small">Volver al Menú Principal</a>
        </div>
    </div>

    <div class="modal fade" id="modalAdd" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0">
                    <h5 class="fw-bold">Agregar Material</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-surtir">
                    <div class="modal-body">
                        <select id="add-material-type" class="form-select mb-3 p-3 border-0 bg-light">
                            <option value="fibra">🥥 Fibra de Coco</option>
                            <option value="aglutinante">🧪 Aglutinante</option>
                        </select>
                        <input type="number" id="add-amount" class="form-control p-3 border-0 bg-light" placeholder="Cantidad en kg" required>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="submit" class="btn btn-eco w-100 py-3">Actualizar Inventario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script> <script type="module" src="js/inventory.js"></script>
</body>
</html>
