<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBuild - Escáner de Trazabilidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar shadow-sm mb-4" style="background-color: var(--eco-dark);">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="tech-home.html">
                ⬅️ Volver
            </a>
            <span class="text-white fw-bold">Escáner QR</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="auth-card p-3 shadow-sm bg-white mb-4">
                    <h5 class="fw-bold mb-3">Escanear Ladrillo</h5>
                    <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden; background: #000;"></div>
                    <p class="small text-muted mt-2 text-center">Apunta la cámara al código QR del lote.</p>
                </div>

                <div id="info-lote" class="d-none">
                    <div class="auth-card p-4 shadow-sm bg-white border-start border-4 border-success">
                        <h4 class="fw-bold mb-3" id="det-id">Cargando...</h4>
                        <hr>
                        <div class="mb-2">
                            <strong>Estado:</strong> <span id="det-estado" class="badge"></span>
                        </div>
                        <div class="mb-2">
                            <strong>Resistencia:</strong> <span id="det-mpa" class="fw-bold"></span> MPa
                        </div>
                        <div class="mb-2">
                            <strong>Absorción:</strong> <span id="det-abs" class="fw-bold"></span> %
                        </div>
                        <div class="mt-3">
                            <button onclick="location.reload()" class="btn btn-outline-secondary btn-sm w-100">Escanear otro</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="js/lector.js"></script>
</body>
</html>
