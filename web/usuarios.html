<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBuild - Gestión de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar shadow-sm mb-4" style="background-color: var(--eco-dark);">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="admin-home.html">⬅️ Volver al Panel</a>
            <span class="text-white fw-bold">Control de Personal</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="auth-card p-4 shadow-sm bg-white border-0">
                    <h5 class="fw-bold mb-4">➕ Registrar Nuevo Usuario</h5>
                    <form id="user-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Correo Electrónico</label>
                            <input type="email" id="user-email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Contraseña Provisional</label>
                            <input type="password" id="user-pass" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Rol en la Planta</label>
                            <select id="user-role" class="form-select">
                                <option value="admin">Administrador</option>
                                <option value="ingeniero">Ingeniero</option>
                                <option value="tecnico">Técnico</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-eco w-100 py-2">Guardar Usuario</button>
                    </form>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="auth-card p-4 shadow-sm bg-white border-0">
                    <h5 class="fw-bold mb-4">👥 Personal Registrado</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/usuarios.js"></script>
</body>
</html>
