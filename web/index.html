<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div id="login-form" class="auth-card">
            <h2>Iniciar Sesión</h2>
            <form id="form-login">
                <div class="input-group">
                    <label for="login-email">Correo</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p>¿No tienes cuenta? <a href="#" id="go-to-register">Regístrate aquí</a></p>
            <div id="login-error" class="error-msg"></div>
        </div>

        <div id="register-form" class="auth-card hidden">
            <h2>Crear Cuenta</h2>
            <form id="form-register">
                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" minlength="6" required>
                </div>
                <div class="input-group">
                    <label for="reg-role">Rol de Usuario</label>
                    <select id="reg-role">
                        <option value="user">Usuario Estándar</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia sesión</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
