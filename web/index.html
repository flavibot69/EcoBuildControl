<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoBuild - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--eco-beige);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--eco-cream);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(62, 39, 35, 0.1);
            border: 1px solid var(--eco-accent);
            width: 100%;
            max-width: 400px;
        }
        /* Clase para ocultar elementos */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card p-4 p-md-5">
            
            <div id="login-form">
                <div class="text-center mb-4">
                    <div class="display-4 mb-2">🥥</div>
                    <h2 class="fw-bold" style="color: var(--eco-dark);">EcoBuild</h2>
                    <p class="text-muted small">Inicia sesión para continuar</p>
                </div>

                <form id="form-login">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" id="login-email" class="form-control border-0 shadow-sm p-3" 
                               placeholder="usuario@ecobuild.com" style="border-radius: 12px;" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" id="login-password" class="form-control border-0 shadow-sm p-3" 
                               placeholder="••••••••" style="border-radius: 12px;" required>
                    </div>

                    <button type="submit" class="btn btn-eco w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px;">
                        Entrar
                    </button>

                    <div id="login-error" class="text-danger small text-center mt-3 fw-bold"></div>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">¿Eres nuevo?</p>
                        <a href="#" id="go-to-register" class="fw-bold text-decoration-none" style="color: var(--eco-dark);">
                            Crear una cuenta técnica
                        </a>
                    </div>
                </form>
            </div>

            <div id="register-form" class="hidden">
                <div class="text-center mb-4">
                    <div class="display-4 mb-2">🌱</div>
                    <h2 class="fw-bold" style="color: var(--eco-dark);">Crear Cuenta</h2>
                    <p class="text-muted small">Únete al equipo EcoBuild</p>
                </div>

                <form id="form-register">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" id="reg-email" class="form-control border-0 shadow-sm p-3" 
                               placeholder="nuevo@ecobuild.com" style="border-radius: 12px;" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Rol de Usuario</label>
                        <select id="reg-role" class="form-select border-0 shadow-sm p-3" style="border-radius: 12px;">
                            <option value="tecnico">Técnico Operativo</option>
                            <option value="admin">Ingeniero Administrador</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" id="reg-password" class="form-control border-0 shadow-sm p-3" 
                               placeholder="Crea una clave" style="border-radius: 12px;" required>
                    </div>

                    <button type="submit" class="btn btn-eco w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px;">
                        Registrarse
                    </button>

                    <div class="text-center mt-4">
                        <a href="#" id="go-to-login" class="fw-bold text-decoration-none" style="color: var(--eco-dark);">
                            Volver al inicio de sesión
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
