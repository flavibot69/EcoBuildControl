<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-sidebar { background: #1e293b; color: white; padding: 20px; height: 100vh; width: 200px; position: fixed; }
        .admin-main { margin-left: 220px; padding: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #4f46e5; }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <h2>ADMIN</h2>
        <hr>
        <p>Usuarios</p>
        <p>Configuración</p>
        <button id="logout-btn" class="btn-logout" style="width: 100%; margin-top: 20px;">Salir</button>
    </div>

    <main class="admin-main">
        <h1>Panel de Administración</h1>
        <div class="stat-card">
            <h3>Resumen del Sistema</h3>
            <p>Estás logueado como: <strong id="admin-email">...</strong></p>
        </div>
    </main>

    <script>
        // Verificación de sesión de Admin
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user || user.role !== 'admin') {
            alert("Acceso denegado. Solo administradores.");
            window.location.href = 'index.html';
        } else {
            document.getElementById('admin-email').innerText = user.email;
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
